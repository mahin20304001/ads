<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="./assets/website-logo.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <section class="auth-shell" style="grid-template-columns: 1fr;">
        <div class="auth-panel">
          <h2>Games</h2>
          <p class="form-subtitle">Select a game.</p>

          <div class="wallet-stats" style="margin-top: 14px;">
            <div class="wallet-stat">
              <span class="wallet-label">Available</span>
              <span class="wallet-value">4</span>
            </div>
          </div>

          <div class="wallet-stats" style="margin-top: 14px;">
            <a class="wallet-stat" href="./game.html" style="text-decoration: none;">
              <span class="wallet-label">Tap the Dot</span>
              <span class="wallet-value">Play</span>
            </a>
            <a class="wallet-stat" href="./iq-test.html" style="text-decoration: none;">
              <span class="wallet-label">IQ Test</span>
              <span class="wallet-value">Start</span>
            </a>
            <a class="wallet-stat" href="./love-test.html" style="text-decoration: none;">
              <span class="wallet-label">Love Test</span>
              <span class="wallet-value">Try</span>
            </a>
            <a class="wallet-stat" href="./puzzle-solve.html" style="text-decoration: none;">
              <span class="wallet-label">Puzzle Solve</span>
              <span class="wallet-value">Play</span>
            </a>
          </div>

          <a class="ghost-btn" href="./index.html" style="display: inline-block; width: 100%; text-align: center; text-decoration: none;">Back</a>
        </div>
      </section>
    </main>
  </body>
</html>
